<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 服务器错误</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    <style>
        .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 2rem; }
        .error-card { text-align: center; max-width: 420px; }
        .error-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--danger), #f97316); border-radius: var(--radius-xl); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; box-shadow: 0 8px 32px rgba(239,68,68,0.3); }
        .error-icon i { font-size: 2.5rem; color: #fff; }
        .error-code { font-size: 5rem; font-weight: 800; color: var(--text-primary); line-height: 1; letter-spacing: -0.04em; margin-bottom: 0.5rem; }
        .error-title { font-size: 1.35rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
        .error-desc { color: var(--text-muted); margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-card">
            <div class="error-icon"><i class="bi bi-bug"></i></div>
            <div class="error-code">500</div>
            <div class="error-title">服务器错误</div>
            <div class="error-desc">抱歉，服务器遇到了一些问题，请稍后再试。</div>
            <div class="d-flex gap-2 justify-content-center">
                <a href="/" class="btn btn-primary"><i class="bi bi-house-door"></i> 返回首页</a>
                <button onclick="location.reload()" class="btn btn-secondary"><i class="bi bi-arrow-clockwise"></i> 刷新页面</button>
            </div>
        </div>
    </div>
</body>
</html>
