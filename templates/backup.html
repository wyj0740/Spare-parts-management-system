{% extends "base.html" %}

{% block title %}数据备份 - 备品备件管理系统{% endblock %}

{% block breadcrumb %}
<nav class="breadcrumb-nav">
    <a href="/"><i class="bi bi-house-door"></i> 首页</a>
    <i class="bi bi-chevron-right"></i>
    <span class="active">数据备份</span>
</nav>
{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="page-title">数据备份管理</h1>
        <div class="page-subtitle">定期自动备份，保障数据安全</div>
    </div>
</div>

<!-- 备份配置 -->
<div class="card mb-4">
    <div class="card-header"><i class="bi bi-gear"></i> 备份配置</div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">自动备份</label>
                <select class="form-select" id="autoBackupEnabled">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">备份时间</label>
                <input type="time" class="form-control" id="backupTime">
            </div>
            <div class="col-md-3">
                <label class="form-label">保留天数</label>
                <input type="number" class="form-control" id="keepDays" min="1" max="365">
            </div>
            <div class="col-md-3">
                <label class="form-label">备份类型</label>
                <select class="form-select" id="backupType">
                    <option value="both">数据库+Excel</option>
                    <option value="database">仅数据库</option>
                    <option value="excel">仅Excel</option>
                </select>
            </div>
        </div>
        <div class="toolbar mt-3">
            <button class="btn btn-primary" onclick="saveConfig()">
                <i class="bi bi-save"></i> 保存配置
            </button>
            <button class="btn btn-success" onclick="backupNow()">
                <i class="bi bi-arrow-down-circle"></i> 立即备份
            </button>
        </div>
    </div>
</div>

<!-- 备份文件列表 -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-archive"></i> 备份文件列表</span>
        <button class="btn btn-outline-secondary btn-sm" onclick="loadBackups()">
            <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th style="width: 40%;">文件名</th>
                        <th style="width: 15%;">类型</th>
                        <th style="width: 15%;">大小</th>
                        <th style="width: 20%;">创建时间</th>
                        <th style="width: 10%;">操作</th>
                    </tr>
                </thead>
                <tbody id="backupTableBody">
                    <tr class="skeleton-row"><td colspan="5"><div class="skeleton skeleton-text" style="width:40%"></div></td></tr>
                    <tr class="skeleton-row"><td colspan="5"><div class="skeleton skeleton-text" style="width:60%"></div></td></tr>
                    <tr class="skeleton-row"><td colspan="5"><div class="skeleton skeleton-text" style="width:50%"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function loadConfig() {
        $.ajax({
            url: '/api/backup/config', method: 'GET',
            success: function(response) {
                if (response.success) {
                    const config = response.data;
                    $('#autoBackupEnabled').val(config.auto_backup_enabled ? 'true' : 'false');
                    $('#backupTime').val(config.backup_time || '02:00');
                    $('#keepDays').val(config.keep_days || 30);
                    $('#backupType').val(config.backup_type || 'both');
                }
            },
            error: function() { showAlert('加载配置失败', 'danger'); }
        });
    }

    function saveConfig() {
        const config = {
            auto_backup_enabled: $('#autoBackupEnabled').val() === 'true',
            backup_time: $('#backupTime').val(),
            keep_days: parseInt($('#keepDays').val()),
            backup_type: $('#backupType').val()
        };
        $.ajax({
            url: '/api/backup/config', method: 'PUT',
            contentType: 'application/json', data: JSON.stringify(config),
            success: function(response) {
                if (response.success) {
                    showAlert('配置保存成功！自动备份已' + (config.auto_backup_enabled ? '启用' : '禁用'), 'success');
                }
            },
            error: function(xhr) {
                showAlert(xhr.responseJSON?.message || '保存配置失败', 'danger');
            }
        });
    }

    function backupNow() {
        showAlert('正在执行备份，请稍候...', 'info');
        $.ajax({
            url: '/api/backup/now', method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ backup_type: $('#backupType').val() }),
            success: function(response) {
                if (response.success) { showAlert(response.message, 'success'); loadBackups(); }
            },
            error: function(xhr) {
                showAlert(xhr.responseJSON?.message || '备份失败', 'danger');
            }
        });
    }

    function loadBackups() {
        $.ajax({
            url: '/api/backup/list', method: 'GET',
            success: function(response) {
                if (response.success) displayBackups(response.data);
            },
            error: function() { showAlert('加载备份列表失败', 'danger'); }
        });
    }

    function displayBackups(backups) {
        const tbody = $('#backupTableBody');
        tbody.empty();
        if (backups.length === 0) {
            tbody.append(`<tr><td colspan="5" class="text-center empty-state"><i class="bi bi-inbox"></i><p>暂无备份文件</p></td></tr>`);
            return;
        }
        backups.forEach(function(backup) {
            const typeBadge = backup.type === 'database'
                ? '<span class="badge bg-primary">数据库</span>'
                : '<span class="badge bg-success">Excel</span>';
            const sizeKB = (backup.size / 1024).toFixed(2);
            const sizeMB = (backup.size / 1024 / 1024).toFixed(2);
            const sizeDisplay = backup.size > 1024 * 1024 ? sizeMB + ' MB' : sizeKB + ' KB';
            tbody.append(`
                <tr>
                    <td><i class="bi bi-file-earmark-zip me-1"></i> ${backup.filename}</td>
                    <td>${typeBadge}</td>
                    <td>${sizeDisplay}</td>
                    <td><i class="bi bi-clock me-1 text-muted"></i>${backup.created_at}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="downloadBackup('${backup.filename}')" title="下载"><i class="bi bi-download"></i></button>
                        <button class="btn btn-sm btn-danger ms-1" onclick="deleteBackup('${backup.filename}')" title="删除"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `);
        });
    }

    function downloadBackup(filename) {
        window.location.href = `/api/backup/download/${filename}`;
    }

    function deleteBackup(filename) {
        if (!confirm('确定要删除这个备份文件吗？')) return;
        $.ajax({
            url: `/api/backup/delete/${filename}`, method: 'DELETE',
            success: function(response) {
                if (response.success) { showAlert('备份文件删除成功', 'success'); loadBackups(); }
            },
            error: function(xhr) {
                showAlert(xhr.responseJSON?.message || '删除失败', 'danger');
            }
        });
    }

    $(document).ready(function() {
        loadConfig();
        loadBackups();
    });
</script>
{% endblock %}
