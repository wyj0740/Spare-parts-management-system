{% extends "base.html" %}

{% block title %}创建备件 - 备品备件管理系统{% endblock %}

{% block breadcrumb %}
<nav class="breadcrumb-nav">
    <a href="/"><i class="bi bi-house-door"></i> 首页</a>
    <i class="bi bi-chevron-right"></i>
    <a href="/">备件列表</a>
    <i class="bi bi-chevron-right"></i>
    <span class="active">创建备件</span>
</nav>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="page-title">创建新备件</h1>
        <div class="page-subtitle">填写备件基本信息并保存</div>
    </div>
    <button class="btn btn-secondary" onclick="window.location.href='/'">
        <i class="bi bi-arrow-left"></i> 返回列表
    </button>
</div>

<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-plus-circle"></i> 创建新备件
                </div>
                <div class="card-body">
                    <form id="createSparePartForm">
                        <div class="row">
                            <!-- 基本信息 -->
                            <div class="col-md-12">
                                <div class="section-header"><i class="bi bi-info-circle"></i> 基本信息</div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label"><i class="bi bi-box-seam"></i> 备件名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="assetNumber" class="form-label"><i class="bi bi-upc-scan"></i> 资产编号 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="assetNumber" name="asset_number" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="ownership" class="form-label"><i class="bi bi-layers"></i> 系统</label>
                                <input type="text" class="form-control" id="ownership" name="ownership" list="ownershipList" placeholder="选择或输入系统">
                                <datalist id="ownershipList">
                                    <option value="自观系统">
                                    <option value="信息系统">
                                    <option value="观测场">
                                </datalist>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="productNumber" class="form-label"><i class="bi bi-upc"></i> 出厂编号</label>
                                <input type="text" class="form-control" id="productNumber" name="product_number">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="specifications" class="form-label"><i class="bi bi-rulers"></i> 规格型号</label>
                                <input type="text" class="form-control" id="specifications" name="specifications">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="manufacturer" class="form-label"><i class="bi bi-buildings"></i> 生产厂家</label>
                                <input type="text" class="form-control" id="manufacturer" name="manufacturer">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="usageStatus" class="form-label"><i class="bi bi-tag"></i> 使用状态</label>
                                <select class="form-select" id="usageStatus" name="usage_status">
                                    <option value="在库" selected>在库</option>
                                    <option value="在用">在用</option>
                                    <option value="维修中">维修中</option>
                                    <option value="报废">报废</option>
                                </select>
                            </div>
                            
                            <div class="col-md-12 mb-3">
                                <label for="storageLocation" class="form-label"><i class="bi bi-geo-alt"></i> 存放地点</label>
                                <input type="text" class="form-control" id="storageLocation" name="storage_location" list="storageLocationList" placeholder="选择或输入存放地点">
                                <datalist id="storageLocationList">
                                </datalist>
                            </div>
                            
                            <!-- 日期和财务信息 -->
                            <div class="col-md-12 mt-3">
                                <div class="section-header"><i class="bi bi-calendar-check"></i> 日期和财务信息</div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="purchaseDate" class="form-label"><i class="bi bi-cart-check"></i> 采购日期</label>
                                <input type="date" class="form-control" id="purchaseDate" name="purchase_date">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="lastInspectionDate" class="form-label"><i class="bi bi-calendar-check"></i> 上次检定日期</label>
                                <input type="date" class="form-control" id="lastInspectionDate" name="last_inspection_date">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="nextInspectionDate" class="form-label"><i class="bi bi-calendar-event"></i> 下次检定日期</label>
                                <input type="date" class="form-control" id="nextInspectionDate" name="next_inspection_date">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="warrantyPeriod" class="form-label"><i class="bi bi-shield-check"></i> 质保期（月）</label>
                                <input type="number" class="form-control" id="warrantyPeriod" name="warranty_period" min="0">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="unitPrice" class="form-label"><i class="bi bi-currency-yen"></i> 单价（元）</label>
                                <input type="number" class="form-control" id="unitPrice" name="unit_price" step="0.01" min="0">
                            </div>
                            
                            <!-- 备注 -->
                            <div class="col-md-12 mt-3">
                                <div class="section-header"><i class="bi bi-chat-left-text"></i> 备注信息</div>
                            </div>
                            
                            <div class="col-md-12 mb-3">
                                <label for="remarks" class="form-label"><i class="bi bi-chat-left-text"></i> 备注</label>
                                <textarea class="form-control" id="remarks" name="remarks" rows="3"></textarea>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearDraft()" id="clearDraftBtn" style="display:none;">
                                <i class="bi bi-trash"></i> 清除草稿
                            </button>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary" onclick="window.location.href='/'">
                                    <i class="bi bi-x-circle"></i> 取消
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i> 创建备件
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const DRAFT_KEY = 'sparePartDraft';

    $(document).ready(function() {
        // 加载下拉选项
        loadOptions();

        // 草稿恢复
        const draft = localStorage.getItem(DRAFT_KEY);
        if (draft) {
            try {
                const data = JSON.parse(draft);
                if (data && Object.values(data).some(v => v)) {
                    showAlert('检测到未提交的草稿，已自动恢复', 'info');
                    restoreDraft(data);
                    $('#clearDraftBtn').show();
                }
            } catch (e) { localStorage.removeItem(DRAFT_KEY); }
        }

        // 自动保存草稿（防抖 800ms）
        let draftTimer;
        $('#createSparePartForm input, #createSparePartForm select, #createSparePartForm textarea').on('input change', function() {
            clearTimeout(draftTimer);
            draftTimer = setTimeout(saveDraft, 800);
        });

        $('#createSparePartForm').submit(function(e) {
            e.preventDefault();
            createSparePart();
        });
    });

    function saveDraft() {
        const data = {
            name: $('#name').val(),
            asset_number: $('#assetNumber').val(),
            ownership: $('#ownership').val(),
            product_number: $('#productNumber').val(),
            specifications: $('#specifications').val(),
            manufacturer: $('#manufacturer').val(),
            usage_status: $('#usageStatus').val(),
            storage_location: $('#storageLocation').val(),
            purchase_date: $('#purchaseDate').val(),
            last_inspection_date: $('#lastInspectionDate').val(),
            next_inspection_date: $('#nextInspectionDate').val(),
            warranty_period: $('#warrantyPeriod').val(),
            unit_price: $('#unitPrice').val(),
            remarks: $('#remarks').val()
        };
        localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
        $('#clearDraftBtn').show();
    }

    function restoreDraft(data) {
        if (data.name) $('#name').val(data.name);
        if (data.asset_number) $('#assetNumber').val(data.asset_number);
        if (data.ownership) $('#ownership').val(data.ownership);
        if (data.product_number) $('#productNumber').val(data.product_number);
        if (data.specifications) $('#specifications').val(data.specifications);
        if (data.manufacturer) $('#manufacturer').val(data.manufacturer);
        if (data.usage_status) $('#usageStatus').val(data.usage_status);
        if (data.storage_location) $('#storageLocation').val(data.storage_location);
        if (data.purchase_date) $('#purchaseDate').val(data.purchase_date);
        if (data.last_inspection_date) $('#lastInspectionDate').val(data.last_inspection_date);
        if (data.next_inspection_date) $('#nextInspectionDate').val(data.next_inspection_date);
        if (data.warranty_period) $('#warrantyPeriod').val(data.warranty_period);
        if (data.unit_price) $('#unitPrice').val(data.unit_price);
        if (data.remarks) $('#remarks').val(data.remarks);
    }

    function clearDraft() {
        if (confirm('确定要清除草稿吗？')) {
            localStorage.removeItem(DRAFT_KEY);
            $('#createSparePartForm')[0].reset();
            $('#clearDraftBtn').hide();
            showAlert('草稿已清除', 'success');
        }
    }

    function loadOptions() {
        $.ajax({
            url: '/api/spare-parts/options',
            method: 'GET',
            success: function(response) {
                if (response.success) {
                    const data = response.data;
                    
                    // 填充系统选项（保留默认选项，追加数据库中的选项）
                    const ownershipList = $('#ownershipList');
                    const defaultOwnerships = ['自观系统', '信息系统', '观测场'];
                    const allOwnerships = [...new Set([...defaultOwnerships, ...data.ownerships])];
                    ownershipList.empty();
                    allOwnerships.forEach(function(item) {
                        ownershipList.append(`<option value="${item}">`);
                    });
                    
                    // 填充存放地点选项
                    const locationList = $('#storageLocationList');
                    locationList.empty();
                    data.storage_locations.forEach(function(item) {
                        locationList.append(`<option value="${item}">`);
                    });
                }
            }
        });
    }

    function createSparePart() {
        const formData = {
            name: $('#name').val(),
            asset_number: $('#assetNumber').val(),
            ownership: $('#ownership').val(),
            product_number: $('#productNumber').val(),
            specifications: $('#specifications').val(),
            manufacturer: $('#manufacturer').val(),
            usage_status: $('#usageStatus').val(),
            storage_location: $('#storageLocation').val(),
            purchase_date: $('#purchaseDate').val(),
            last_inspection_date: $('#lastInspectionDate').val(),
            next_inspection_date: $('#nextInspectionDate').val(),
            warranty_period: $('#warrantyPeriod').val() ? parseInt($('#warrantyPeriod').val()) : null,
            unit_price: $('#unitPrice').val() ? parseFloat($('#unitPrice').val()) : null,
            remarks: $('#remarks').val()
        };

        // 验证必填项
        if (!formData.name || !formData.asset_number) {
            showAlert('请填写必填项（名称和资产编号）', 'warning');
            return;
        }

        $.ajax({
            url: '/api/spare-parts',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function(response) {
                if (response.success) {
                    localStorage.removeItem(DRAFT_KEY);
                    showAlert('备件创建成功！', 'success');
                    setTimeout(function() {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showAlert('创建失败：' + response.message, 'danger');
                }
            },
            error: function(xhr) {
                const response = xhr.responseJSON;
                if (response && response.message) {
                    showAlert('创建失败：' + response.message, 'danger');
                } else {
                    showAlert('网络错误，请稍后重试', 'danger');
                }
            }
        });
    }


</script>
{% endblock %}
