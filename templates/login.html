<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 备品备件管理系统</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <!-- 左侧品牌区 -->
        <div class="login-left">
            <div class="login-left-content">
                <div class="brand-icon">
                    <i class="bi bi-box-seam"></i>
                </div>
                <h2>备品备件管理系统</h2>
                <p>高效管理备件全生命周期，智能检定提醒，数据安全可靠</p>
            </div>
        </div>

        <!-- 右侧登录表单 -->
        <div class="login-right">
            <div class="login-form-header">
                <h3>欢迎回来</h3>
                <p>请登录您的账户以继续</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" class="form-control" id="username" placeholder="请输入用户名" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberUsername">
                        <label class="form-check-label" for="rememberUsername" style="font-size: 0.85rem; color: var(--text-secondary);">记住用户名</label>
                    </div>
                </div>

                <div id="alertContainer"></div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>登 录
                </button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        $(document).ready(function() {
            // 记住用户名
            var savedUser = localStorage.getItem('sparePartsUsername');
            if (savedUser) {
                $('#username').val(savedUser);
                $('#rememberUsername').prop('checked', true);
                setTimeout(function() { $('#password').focus(); }, 100);
            }

            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                var username = $('#username').val().trim();
                var password = $('#password').val();
                if (!username || !password) {
                    showAlert('请输入用户名和密码', 'warning');
                    return;
                }
                if ($('#rememberUsername').is(':checked')) {
                    localStorage.setItem('sparePartsUsername', username);
                } else {
                    localStorage.removeItem('sparePartsUsername');
                }
                var $btn = $('.btn-login');
                var originalText = $btn.html();
                $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>登录中...');
                $.ajax({
                    url: '/api/login', method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ username: username, password: password }),
                    success: function(response) {
                        if (response.success) {
                            showAlert('登录成功，正在跳转...', 'success');
                            setTimeout(function() { window.location.href = '/'; }, 500);
                        } else {
                            showAlert(response.message || '登录失败', 'danger');
                            $btn.prop('disabled', false).html(originalText);
                        }
                    },
                    error: function(xhr) {
                        showAlert(xhr.responseJSON ? xhr.responseJSON.message : '网络错误，请稍后重试', 'danger');
                        $btn.prop('disabled', false).html(originalText);
                    }
                });
            });

            function showAlert(message, type) {
                var alertHtml = '<div class="alert alert-' + type + ' alert-dismissible fade show animate-fade-in" role="alert">' +
                    message + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
                $('#alertContainer').html(alertHtml);
                setTimeout(function() { $('#alertContainer .alert').alert('close'); }, 5000);
            }
        });
    </script>
</body>
</html>
