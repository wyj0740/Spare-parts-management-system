{% extends "base.html" %}

{% block title %}历史文件管理 - 备品备件管理系统{% endblock %}

{% block breadcrumb %}
<nav class="breadcrumb-nav">
    <a href="/"><i class="bi bi-house-door"></i> 首页</a>
    <i class="bi bi-chevron-right"></i>
    <span class="active">历史文件</span>
</nav>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="page-title">历史文件管理</h1>
        <div class="page-subtitle">查看和管理历史文档资料</div>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-archive"></i> 历史文件管理</span>
            <div class="btn-group">
                <button class="btn btn-outline-secondary" onclick="loadFolderInfo()" title="刷新">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
                <button class="btn btn-outline-info" onclick="copyFolderPath()" title="复制路径">
                    <i class="bi bi-clipboard"></i>
                </button>
                <button class="btn btn-primary" onclick="openHistoricalFolder()">
                    <i class="bi bi-folder2-open"></i> 打开文件夹
                </button>
            </div>
        </div>
        <div class="card-body">
            <div class="alert alert-info mb-3">
                <i class="bi bi-info-circle"></i> 
                <strong>提示：</strong>点击"打开文件夹"按钮可直接在Windows资源管理器中管理历史文件。
                您可以直接在文件夹中添加、删除、重命名文件。
            </div>
            <div id="folderInfoContainer">
                <div class="d-flex align-items-center gap-3 p-4">
                    <div class="skeleton skeleton-circle"></div>
                    <div style="flex:1">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text" style="width:40%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentFolderPath = '';

    $(document).ready(function() {
        loadFolderInfo();
    });

    function loadFolderInfo() {
        $.ajax({
            url: '/api/folder/historical-documents/info',
            method: 'GET',
            success: function(response) {
                if (response.success) {
                    currentFolderPath = response.data.folder_path;
                    displayFolderInfo(response.data);
                }
            },
            error: function() {
                $('#folderInfoContainer').html('<div class="text-center text-danger">加载失败</div>');
            }
        });
    }

    function copyFolderPath() {
        if (!currentFolderPath) {
            loadFolderInfo();
            return;
        }
        navigator.clipboard.writeText(currentFolderPath).then(function() {
            showAlert('路径已复制到剪贴板', 'success');
        }).catch(function() {
            const textArea = document.createElement('textarea');
            textArea.value = currentFolderPath;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showAlert('路径已复制到剪贴板', 'success');
        });
    }

    function displayFolderInfo(data) {
        const container = $('#folderInfoContainer');
        container.empty();

        const totalSizeKB = (data.total_size / 1024).toFixed(2);
        const totalSizeMB = (data.total_size / (1024 * 1024)).toFixed(2);
        const displaySize = data.total_size > 1024 * 1024 ? totalSizeMB + ' MB' : totalSizeKB + ' KB';

        let html = `
            <div class="d-flex align-items-center mb-3 p-3" style="background: #f8fafc; border-radius: 8px;">
                <i class="bi bi-folder2-open fs-2 me-3 text-primary"></i>
                <div>
                    <strong>文件夹路径：</strong>
                    <code style="word-break: break-all;">${data.folder_path}</code>
                    <br>
                    <small class="text-muted">
                        <i class="bi bi-files"></i> ${data.file_count} 个文件
                        <span class="ms-2"><i class="bi bi-hdd"></i> ${displaySize}</span>
                    </small>
                </div>
            </div>
        `;

        if (data.files && data.files.length > 0) {
            html += '<h6 class="mb-2"><i class="bi bi-list-ul"></i> 文件列表</h6>';
            html += '<div class="list-group">';
            
            data.files.forEach(function(file) {
                const fileSize = (file.size / 1024).toFixed(2);
                const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
                const displayFileSize = file.size > 1024 * 1024 ? fileSizeMB + ' MB' : fileSize + ' KB';
                const fileIcon = getFileIcon(file.name);
                
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <i class="bi ${fileIcon} me-2"></i>
                            <strong>${file.name}</strong>
                        </div>
                        <small class="text-muted">
                            <i class="bi bi-hdd"></i> ${displayFileSize}
                            <span class="ms-2"><i class="bi bi-clock"></i> ${file.modified}</span>
                        </small>
                    </div>
                `;
            });
            
            html += '</div>';
        } else {
            html += '<div class="text-center" style="color: #94a3b8; padding: 40px;">文件夹为空，点击"打开文件夹"添加文件</div>';
        }

        container.html(html);
    }

    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const iconMap = {
            'pdf': 'bi-file-earmark-pdf-fill text-danger',
            'doc': 'bi-file-earmark-word-fill text-primary',
            'docx': 'bi-file-earmark-word-fill text-primary',
            'xls': 'bi-file-earmark-excel-fill text-success',
            'xlsx': 'bi-file-earmark-excel-fill text-success',
            'png': 'bi-file-earmark-image-fill text-info',
            'jpg': 'bi-file-earmark-image-fill text-info',
            'jpeg': 'bi-file-earmark-image-fill text-info',
            'zip': 'bi-file-earmark-zip-fill text-warning',
            'rar': 'bi-file-earmark-zip-fill text-warning',
            'txt': 'bi-file-earmark-text-fill'
        };
        return iconMap[ext] || 'bi-file-earmark-fill';
    }

    function openHistoricalFolder() {
        $.ajax({
            url: '/api/folder/historical-documents/open',
            method: 'POST',
            success: function(response) {
                if (response.success) {
                    showAlert('已打开文件夹', 'success');
                    setTimeout(loadFolderInfo, 1000);
                } else {
                    showAlert('打开失败：' + response.message, 'danger');
                }
            },
            error: function() {
                showAlert('网络错误，请稍后重试', 'danger');
            }
        });
    }


</script>
{% endblock %}
