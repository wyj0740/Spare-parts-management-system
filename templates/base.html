<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}备品备件管理系统{% endblock %}</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 顶部进度条 -->
    <div id="topProgressBar"><div class="progress-bar-inner"></div></div>

    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()" title="菜单">
        <i class="bi bi-list"></i>
    </button>

    <!-- 移动端遮罩 -->
    <div class="mobile-menu-overlay" onclick="toggleMobileMenu()"></div>

    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="bi bi-box-seam"></i>
                <span>备件管理系统</span>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item" href="/" id="nav-home">
                    <i class="bi bi-list-ul"></i>
                    <span>备件列表</span>
                </a>
                <a class="nav-item" href="/create" id="nav-create">
                    <i class="bi bi-plus-circle"></i>
                    <span>创建备件</span>
                </a>
                <a class="nav-item" href="/backup" id="nav-backup">
                    <i class="bi bi-database-fill-down"></i>
                    <span>数据备份</span>
                </a>
                <a class="nav-item" href="/historical-documents" id="nav-docs">
                    <i class="bi bi-archive"></i>
                    <span>历史文件</span>
                </a>
                <a class="nav-item" href="/audit" id="nav-audit">
                    <i class="bi bi-journal-text"></i>
                    <span>操作日志</span>
                </a>
                <a class="nav-item" href="/settings" id="nav-settings">
                    <i class="bi bi-gear"></i>
                    <span>系统设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>登出</span>
                </button>
                <div class="sidebar-version" id="sidebarVersion"></div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <div class="main-area">
            <div class="content-wrapper">
                {% block breadcrumb %}{% endblock %}
                {% block content %}{% endblock %}
            </div>
            <div class="app-footer">
                备品备件管理系统 | Author: wyj | License: MIT
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
    <script>
    function logout() {
        if (confirm('确定要登出吗？')) {
            $.ajax({
                url: '/api/logout', method: 'POST',
                success: function(r) { if (r.success) window.location.href = '/login'; },
                error: function() { window.location.href = '/login'; }
            });
        }
    }

    function showAlert(message, type) {
        const titles = { success: '操作成功', danger: '发生错误', warning: '请注意', info: '提示' };
        const icons = { success: 'bi-check-circle', danger: 'bi-x-circle', warning: 'bi-exclamation-triangle', info: 'bi-info-circle' };
        const toastType = type === 'danger' ? 'toast-danger' : 'toast-' + type;
        const toast = $(`
            <div class="toast-alert ${toastType}" role="alert">
                <div class="toast-icon"><i class="bi ${icons[type] || 'bi-info-circle'}"></i></div>
                <div class="toast-content">
                    <div class="toast-title">${titles[type] || '提示'}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="$(this).closest('.toast-alert').addClass('hiding'); setTimeout(()=>$(this).closest('.toast-alert').remove(), 260);"><i class="bi bi-x-lg"></i></button>
            </div>`);
        $('body').append(toast);
        setTimeout(function() { toast.addClass('hiding'); setTimeout(() => toast.remove(), 260); }, 3500);
    }

    function showProgress() { $('#topProgressBar').removeClass('done').addClass('active'); }
    function hideProgress() { $('#topProgressBar').addClass('done'); setTimeout(() => $('#topProgressBar').removeClass('active done'), 300); }

    function toggleMobileMenu() {
        $('.sidebar').toggleClass('open');
        $('.mobile-menu-overlay').fadeToggle(200);
    }

    // 侧边栏当前项高亮
    $(document).ready(function() {
        const path = window.location.pathname;
        $('.sidebar-nav .nav-item').removeClass('active');
        if (path === '/' || path === '') $('#nav-home').addClass('active');
        else if (path === '/create') $('#nav-create').addClass('active');
        else if (path === '/backup') $('#nav-backup').addClass('active');
        else if (path === '/historical-documents') $('#nav-docs').addClass('active');
        else if (path === '/audit') $('#nav-audit').addClass('active');
        else if (path === '/settings') $('#nav-settings').addClass('active');
        else if (path.startsWith('/detail')) $('#nav-home').addClass('active');

        // 加载版本号
        $.ajax({
            url: '/api/settings/info', method: 'GET',
            success: function(r) {
                if (r.success && r.data.version) {
                    $('#sidebarVersion').text(r.data.version);
                }
            }
        });
    });

    // 全局键盘快捷键
    $(document).keydown(function(e) {
        // ESC 关闭所有模态框
        if (e.key === 'Escape') {
            $('.modal.show').each(function() {
                const inst = bootstrap.Modal.getInstance(this);
                if (inst) inst.hide();
            });
        }
        // 忽略 input/textarea 中的快捷键（除了ESC）
        const tag = e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

        // Ctrl+N 新建备件
        if (e.ctrlKey && (e.key === 'n' || e.key === 'N')) {
            e.preventDefault();
            window.location.href = '/create';
        }
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
